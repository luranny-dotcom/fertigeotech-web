// -- LocalDB (offline) ------------------------------------------
const DB={
  get lots(){return JSON.parse(localStorage.getItem('ft_lots')||'[]')},
  get telem(){return JSON.parse(localStorage.getItem('ft_telem')||'[]')},
  get jars(){return JSON.parse(localStorage.getItem('ft_jars')||'[]')},
  saveLots(d){localStorage.setItem('ft_lots',JSON.stringify(d))},
  saveTelem(d){localStorage.setItem('ft_telem',JSON.stringify(d))},
  saveJars(d){localStorage.setItem('ft_jars',JSON.stringify(d))},
}
function uid(){return Date.now()+'-'+Math.random().toString(36).slice(2,6)}
async function insert(table,row){
  if(table==='lots'){const d=DB.lots;d.unshift(row);DB.saveLots(d)}
  else if(table==='telem'){const d=DB.telem;d.unshift(row);DB.saveTelem(d)}
  else if(table==='jars'){const d=DB.jars;d.unshift(row);DB.saveJars(d)}
}
async function update(table,id,patch){
  if(table==='lots'){const d=DB.lots;const i=d.findIndex(r=>r.id===id);if(i>-1){d[i]={...d[i],...patch};DB.saveLots(d)}}
}
const dbUpdate=update  // alias

async function dbSelect(table,filter){
  const rows=await selectAll(table)
  if(!filter) return rows
  return rows.filter(r=>Object.entries(filter).every(([k,v])=>r[k]===v))
}


async function selectAll(table){
  if(table==='lots') return DB.lots
  if(table==='telem') return DB.telem
  if(table==='jars') return DB.jars
  return []
}

function nrm(s){return s.toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g,'')}
function detectType(name){
  const n=nrm(name)
  for(const[k,t] of Object.entries(PDB)){if(n.includes(nrm(k))) return t}
  if(/\b(ec|ew|emulsão)\b/.test(n)) return 'EC'
  if(/\b(sl|solução)\b/.test(n)) return 'SL'
  if(/\b(óleo|oleo|oil)\b/.test(n)) return 'ADJ'
  return '?'
}
function parseRecipe(txt){
  if(!txt||!txt.trim()) return []
  return txt.split(/[+;\n]/).map(s=>s.trim()).filter(Boolean).map(raw=>{
    const dm=raw.match(/[\d,\.]+\s*(L|mL|ml|g|kg|%)\s*(?:\/\s*(?:ha|vc|100L|hL))?/i)
    const dose=dm?dm[0]:''
    const name=raw.replace(dose,'').replace(/\s+/g,' ').trim()||raw
    const type=detectType(name)
    return{raw,name,dose,type,order:ORD[type]||9}
  }).sort((a,b)=>a.order-b.order)
}
function calcTotal(dose,area){
  if(!dose||!area) return null
  const m=dose.replace(',','.').match(/([\d.]+)\s*(L|mL|ml|g|kg)\s*\/\s*ha/i)
  if(!m) return null
  let v=parseFloat(m[1])*area,u=m[2].toLowerCase()
  if(u==='ml'&&v>=1000){v/=1000;u='L'}
  if(u==='g'&&v>=1000){v/=1000;u='kg'}
  return `${Number.isInteger(v)?v:v.toFixed(v<10?2:1)} ${u}`
}

  {id:'C7',sev:'warning',icon:'⚠️',title:'Bacillus + Cobre',g:[['bacillus','serenade'],['cobre','oxicloreto','calda bordalesa']],msg:'Íons cobre eliminam Bacillus subtilis e outros bioagentes.',rec:'Aplique biológico 48h antes do cobre.'},
]
function detectIncompat(products){
  return RULES.filter(rule=>{
    return rule.g.every(group=>products.some(p=>group.some(pat=>nrm(p.name).includes(nrm(pat)))))
  }).map(rule=>({...rule,matched:products.filter(p=>rule.g.flat().some(pat=>nrm(p.name).includes(nrm(pat)))).map(p=>p.name)}))
}

// -- Timer ------------------------------------------------------
function Timer({seconds}){
  const[rem,setRem]=useState(seconds)
  const[running,setRunning]=useState(false)
  const[done,setDone]=useState(false)
  const ref=useRef(null)
  useEffect(()=>{
    if(running){
      ref.current=setInterval(()=>setRem(p=>{
        if(p<=1){clearInterval(ref.current);setRunning(false);setDone(true);return 0}
        return p-1
      }),1000)
    } else clearInterval(ref.current)
    return()=>clearInterval(ref.current)
  },[running])
  const mm=Math.floor(rem/60),ss=rem%60
  return(
    <div style={{background:'#00313C',borderRadius:14,padding:16,textAlign:'center',marginTop:12}}>
      <div style={{fontSize:40,fontWeight:900,color:'#fff',letterSpacing:3}}>{String(mm).padStart(2,'0')}:{String(ss).padStart(2,'0')}</div>
      {!running&&!done&&<button className="btn" style={{marginTop:10,width:'auto',padding:'8px 24px',fontSize:14}} onClick={()=>setRunning(true)}>▶ Iniciar Timer</button>}
      {running&&<button onClick={()=>setRunning(false)} style={{marginTop:10,background:'rgba(255,255,255,.15)',border:'none',color:'#fff',padding:'8px 24px',borderRadius:20,cursor:'pointer',fontWeight:700}}>⏸ Pausar</button>}
      {done&&<div style={{color:'#7EC8D8',fontWeight:800,marginTop:8,fontSize:14}}>✅ Tempo concluído!</div>}
    </div>
  )
}

// -- Custom products + getAllProducts ------------------------------------
function loadCustomProducts(){
  try{return JSON.parse(localStorage.getItem('ft_custom_products')||'[]')}catch{return[]}
}
function saveCustomProduct(p){
  const list=loadCustomProducts()
  if(!list.find(x=>x.nameKey===p.nameKey)){list.push(p);localStorage.setItem('ft_custom_products',JSON.stringify(list))}
}
function getAllProducts(){
  const base=Object.entries(PDB).map(([name,type])=>({
    name:name.charAt(0).toUpperCase()+name.slice(1),nameKey:name,type,custom:false
  }))
  const custom=loadCustomProducts().map(p=>({...p,custom:true}))
  const merged=[...base]
  custom.forEach(cp=>{if(!merged.find(b=>b.nameKey===cp.nameKey))merged.push(cp)})
  return merged.sort((a,b)=>a.name.localeCompare(b.name))
}

function NewLotScreen({onBack,onSaved}){
  const[farm,setFarm]=useState('')
  const[field,setField]=useState('')
  const[vol,setVol]=useState('')
  const[area,setArea]=useState('')
  const[selectedProducts,setSelectedProducts]=useState([]) // [{name,type,dose}]
  const[saving,setSaving]=useState(false)
  const[err,setErr]=useState('')

  const areaNum=parseFloat(area)||0

  // Monta recipe_text a partir dos produtos selecionados
  const recipeText=selectedProducts.map(p=>p.dose?`${p.name} ${p.dose}`:p.name).join(' + ')

  // Ordena por tipo (ordem de adição) para exibição
  const sortedProducts=useMemo(()=>[...selectedProducts].sort((a,b)=>(ORD[a.type]||9)-(ORD[b.type]||9)),[selectedProducts])
  const incompats=useMemo(()=>detectIncompat(sortedProducts),[sortedProducts])

  const addProduct=(p)=>{
    setSelectedProducts(prev=>[...prev,p])
    setErr('')
  }

  const removeProduct=(idx)=>{
    setSelectedProducts(prev=>prev.filter((_,i)=>i!==idx))
  }

  const moveUp=(idx)=>{
    if(idx===0) return
    setSelectedProducts(prev=>{const a=[...prev];[a[idx-1],a[idx]]=[a[idx],a[idx-1]];return a})
  }
  const moveDown=(idx)=>{
    setSelectedProducts(prev=>{
      if(idx>=prev.length-1) return prev
      const a=[...prev];[a[idx],a[idx+1]]=[a[idx+1],a[idx]];return a
    })
  }

  const save=async(goWater)=>{
    if(!farm.trim()){setErr('Informe a fazenda');return}
    if(!field.trim()){setErr('Informe o talhão');return}
    if(!vol){setErr('Informe o volume');return}
    setSaving(true)
    const lot={id:uid(),created_at:Date.now(),farm:farm.trim(),field:field.trim(),
      volume_liters:parseFloat(vol),area_ha:areaNum||undefined,
      recipe_text:recipeText,status:'REQUESTED'}
    await insert('lots',lot)
    setSaving(false)
    onSaved(lot,goWater)
  }

  return(
    <div style={{flex:1,display:'flex',flexDirection:'column',overflow:'hidden'}}>
      <Hdr title="Nova Mistura" onBack={onBack}/>
      <div className="sc" style={{flex:1,padding:12,paddingBottom:100}}>

        {/* Alerta incompatibilidade */}
        {incompats.length>0&&(
          <div style={{background:'#c62828',borderRadius:14,padding:'12px 14px',marginBottom:10}}>
            <div style={{fontWeight:900,fontSize:14,color:'#fff',marginBottom:8}}>⛔ Incompatibilidade detectada!</div>
            {incompats.map((inc,i)=>(
              <div key={i} style={{background:'rgba(255,255,255,.15)',borderRadius:10,padding:'9px 11px',marginBottom:6}}>
                <div style={{fontWeight:800,fontSize:13,color:'#fff',marginBottom:2}}>{inc.icon} {inc.title}</div>
                <div style={{fontSize:12,color:'rgba(255,255,255,.9)',marginBottom:3}}>{inc.msg}</div>
                <div style={{fontSize:12,color:'#ffcc80',fontWeight:700}}>✅ {inc.rec}</div>
              </div>
            ))}
          </div>
        )}

        {/* Identificação */}
        <div className="card">
          <div style={{fontWeight:800,fontSize:13,color:'#00313C',marginBottom:10}}>📍 Identificação</div>
          <label className="lbl">Fazenda *</label>
          <input className="field" placeholder="Ex: Fazenda São João" value={farm} onChange={e=>setFarm(e.target.value)} style={{marginBottom:10}}/>
          <label className="lbl">Talhão *</label>
          <input className="field" placeholder="Ex: Talhão 5 – Soja" value={field} onChange={e=>setField(e.target.value)}/>
        </div>

        {/* Volume e área */}
        <div className="card">
          <div style={{fontWeight:800,fontSize:13,color:'#00313C',marginBottom:10}}>⚗️ Calda</div>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
            <div><label className="lbl">Volume (L) *</label><input className="field" type="number" placeholder="Ex: 4000" value={vol} onChange={e=>setVol(e.target.value)}/></div>
            <div><label className="lbl">Área (ha)</label><input className="field" type="number" placeholder="Opcional" value={area} onChange={e=>setArea(e.target.value)}/></div>
          </div>
          {areaNum>0&&<div style={{background:'#e0f4f7',borderRadius:8,padding:'7px 12px',fontSize:12,fontWeight:700,color:'#006E85',marginTop:10}}>📐 Área: {areaNum} ha — totais calculados automaticamente</div>}
        </div>

        {/* Seletor de produtos */}
        <div className="card">
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10}}>
            <div style={{fontWeight:800,fontSize:13,color:'#00313C'}}>🧴 Produtos da mistura</div>
            {selectedProducts.length>0&&<span style={{fontSize:12,fontWeight:700,color:'#006E85'}}>{selectedProducts.length} produto{selectedProducts.length>1?'s':''}</span>}
          </div>

          <ProductPicker onAdd={addProduct}/>

          {/* Lista de produtos selecionados */}
          {sortedProducts.length>0&&(
            <div style={{marginTop:12}}>
              <div style={{fontSize:11,fontWeight:700,color:'#999',textTransform:'uppercase',marginBottom:8,letterSpacing:.5}}>Ordem de adição ao tanque <span style={{fontSize:9,fontWeight:400,textTransform:'none',letterSpacing:0}}>· ↑↓ para ajustar</span></div>
              {selectedProducts.map((p,i)=>{
                const total=areaNum>0&&p.dose?calcTotal(p.dose,areaNum):null
                return(
                  <div key={i} style={{display:'flex',alignItems:'center',gap:6,padding:'9px 10px',background:'#f8f8f8',borderRadius:10,marginBottom:6}}>
                    <div style={{display:'flex',flexDirection:'column',gap:2,flexShrink:0}}>
                      <button onMouseDown={()=>moveUp(i)} disabled={i===0} style={{background:i===0?'transparent':'#e0f4f7',border:'none',borderRadius:5,width:22,height:20,cursor:i===0?'default':'pointer',fontSize:11,color:i===0?'#ccc':'#006E85',fontWeight:900,padding:0}}>↑</button>
                      <button onMouseDown={()=>moveDown(i)} disabled={i===selectedProducts.length-1} style={{background:i===selectedProducts.length-1?'transparent':'#e0f4f7',border:'none',borderRadius:5,width:22,height:20,cursor:i===selectedProducts.length-1?'default':'pointer',fontSize:11,color:i===selectedProducts.length-1?'#ccc':'#006E85',fontWeight:900,padding:0}}>↓</button>
                    </div>
                    <div style={{width:22,height:22,borderRadius:'50%',background:'#00313C',color:'#fff',display:'flex',alignItems:'center',justifyContent:'center',fontWeight:900,fontSize:10,flexShrink:0}}>{i+1}</div>
                    <span style={{fontSize:17,flexShrink:0}}>{FI[p.type]||'🔬'}</span>
                    <div style={{flex:1,minWidth:0}}>
                      <div style={{fontWeight:700,fontSize:13,whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{p.name}</div>
                      <div style={{display:'flex',gap:6,alignItems:'center',marginTop:2,flexWrap:'wrap'}}>
                        <span style={{fontSize:10,fontWeight:800,color:'#fff',background:FC[p.type]||'#9E9E9E',padding:'1px 7px',borderRadius:20}}>{FL[p.type]||'?'}</span>
                        {p.dose&&<span style={{fontSize:11,color:'#777'}}>{p.dose}</span>}
                        {total&&<span style={{fontSize:10,fontWeight:800,color:'#006E85',background:'#e0f4f7',padding:'1px 7px',borderRadius:20}}>= {total}</span>}
                      </div>
                    </div>
                    <button onMouseDown={()=>removeProduct(i)} style={{background:'none',border:'none',color:'#e57373',fontSize:18,cursor:'pointer',padding:'2px 4px',flexShrink:0}}>✕</button>
                  </div>
                )
              })}
            </div>
          )}

          {selectedProducts.length===0&&(
            <div style={{textAlign:'center',padding:'16px 0',color:'#bbb',fontSize:13}}>
              Nenhum produto adicionado ainda
            </div>
          )}
        </div>

        {err&&<div style={{background:'#ffebee',color:'#c62828',padding:'9px 12px',borderRadius:10,fontSize:13,fontWeight:700,marginBottom:8}}>⚠️ {err}</div>}
      </div>

      <div style={{padding:'10px 12px 16px',background:'#fff',borderTop:'1px solid #eee',display:'flex',flexDirection:'column',gap:8,flexShrink:0}}>
        <button className="btn" onClick={()=>save(true)} disabled={saving}>{saving?'Salvando...':'Salvar e Analisar Água →'}</button>
        <button className="btn-ghost" onClick={()=>save(false)} disabled={saving}>💾 Salvar e criar outra mistura</button>
        <button className="btn-ghost" onClick={onBack} style={{color:'#bbb',borderColor:'#f0f0f0'}}>Cancelar</button>
      </div>
    </div>
  )
}

function WaterScreen({lot,onBack,onDone}){
  const[ph,setPh]=useState('6.5')
  const[temp,setTemp]=useState('22')
  const[cond,setCond]=useState('')
  const[saving,setSaving]=useState(false)
  const phN=parseFloat(ph)||0,tempN=parseFloat(temp)||0,condN=parseFloat(cond)||undefined
  const phE=evalPH(phN),tempE=evalTemp(tempN),condE=evalCond(condN)
  const overall=overallEval(phE,tempE,condE)
  const save=async()=>{
    setSaving(true)
    const t={id:uid(),lot_id:lot.id,ph:phN,temp_c:tempN,conductivity:condN,evaluation:overall,created_at:Date.now()}
    await insert('telem',t)
    await update('lots',lot.id,{status:'WATER_OK',last_ph:phN,last_temp_c:tempN})
    setSaving(false)
    onDone({...lot,status:'WATER_OK',last_ph:phN},t)
  }
  return(
    <div style={{flex:1,display:'flex',flexDirection:'column',overflow:'hidden'}}>
      <Hdr title="💧 Qualidade da Água" onBack={onBack}/>
      <div className="sc" style={{flex:1,padding:12,paddingBottom:100}}>
        <div style={{background:'#e0f4f7',borderRadius:10,padding:'7px 12px',fontSize:12,fontWeight:700,color:'#006E85',marginBottom:10}}>{lot.farm} — {lot.field} · {lot.volume_liters}L</div>
        <div className="card">
          <div style={{fontWeight:800,fontSize:13,color:'#00313C',marginBottom:10}}>Medições</div>
          <label className="lbl">pH <span style={{color:'#bbb',textTransform:'none',fontWeight:400,letterSpacing:0}}>(ideal: 5,5–6,5)</span></label>
          <input className="field" type="number" step="0.1" min="0" max="14" value={ph} onChange={e=>setPh(e.target.value)} style={{marginBottom:10}}/>
          <label className="lbl">Temperatura °C <span style={{color:'#bbb',textTransform:'none',fontWeight:400,letterSpacing:0}}>(ideal: 10–25)</span></label>
          <input className="field" type="number" step="0.5" value={temp} onChange={e=>setTemp(e.target.value)} style={{marginBottom:10}}/>
          <label className="lbl">Condutividade µS/cm <span style={{color:'#bbb',textTransform:'none',fontWeight:400,letterSpacing:0}}>(opcional, ideal: &lt;200)</span></label>
          <input className="field" type="number" placeholder="Ex: 155" value={cond} onChange={e=>setCond(e.target.value)}/>
        </div>
        <div className="card" style={{borderLeft:`4px solid ${EC[overall]}`,background:EB[overall]}}>
          <div style={{display:'flex',justifyContent:'space-between',marginBottom:10}}>
            <span style={{fontWeight:800,fontSize:13}}>Resultado da Análise</span>
            <span style={{fontWeight:800,fontSize:14,color:EC[overall]}}>{overall}</span>
          </div>
          {[['pH',phN.toFixed(1),phE],['Temperatura',`${tempN}°C`,tempE],...(condN?[['Condutividade',`${condN} µS/cm`,condE]]:[])] .map(([l,v,e])=>(
            <div key={l} style={{display:'flex',justifyContent:'space-between',padding:'7px 0',borderTop:'1px solid rgba(0,0,0,.06)'}}>
              <span style={{fontSize:13,color:'#555'}}>{l}</span>
              <div style={{display:'flex',alignItems:'center',gap:8}}><span style={{fontWeight:800,fontSize:13}}>{v}</span><span style={{fontSize:11,fontWeight:700,color:EC[e]}}>{e}</span></div>
            </div>
          ))}
        </div>
        {phE!=='OK'&&(
          <div className="card" style={{borderLeft:'4px solid #1565C0',background:'#e3f2fd'}}>
            <div style={{fontWeight:800,fontSize:13,color:'#1565C0',marginBottom:6}}>💡 Sugestão de correção</div>
            {phN>6.5&&<div style={{fontSize:12,color:'#0d47a1'}}>pH alto → <b>Ácido cítrico</b>: 0,5–1,0 g por 100L para cada unidade de pH a reduzir.<br/><span style={{color:'#42a5f5'}}>Alt: pH Down comercial (1–5 mL/100L)</span></div>}
            {phN<5.5&&<div style={{fontSize:12,color:'#0d47a1'}}>pH baixo → <b>Bicarbonato de sódio</b>: 0,5–1,0 g/100L. Meça novamente antes de continuar.</div>}
          </div>
        )}
      </div>
      <div style={{padding:'10px 12px 16px',background:'#fff',borderTop:'1px solid #eee'}}>
        <button className="btn" onClick={save} disabled={saving}>{saving?'Salvando...':'Salvar e Continuar →'}</button>
      </div>
    </div>
  )
}

function PrepScreen({lot,onBack,onDone}){
  const products=useMemo(()=>parseRecipe(lot.recipe_text||''),[lot.recipe_text])
  const steps=useMemo(()=>{
    const s=[{icon:'💧',title:'Encher tanque a 50–75%',detail:'Adicione água limpa e ligue o agitador antes de qualquer produto.',fixed:true,timer:null}]
    products.forEach(p=>s.push({icon:FI[p.type],title:`Adicionar: ${p.name}`,dose:p.dose,sub:FL[p.type],color:FC[p.type],detail:FT[p.type],timer:FTm[p.type],fixed:false}))
    s.push({icon:'🪣',title:'Completar volume',detail:'Adicione água até o volume total. Mantenha agitação.',fixed:true,timer:null})
    s.push({icon:'🔍',title:'Verificar aspecto final',detail:'Observe cor, homogeneidade e ausência de grumos. Pronto para Jar Test!',fixed:true,timer:null})
    return s
  },[products])
  const[cur,setCur]=useState(0)
  const[done,setDone]=useState(new Set())
  const[saving,setSaving]=useState(false)
  const s=steps[cur]
  const pct=Math.round(((cur+1)/steps.length)*100)
  const next=async()=>{
    setDone(prev=>new Set([...prev,cur]))
    if(cur<steps.length-1){ setCur(c=>c+1) }
    else{
      setSaving(true)
      await update('lots',lot.id,{status:'JAR_TEST'})
      setSaving(false)
      onDone({...lot,status:'JAR_TEST'})
    }
  }
  return(
    <div style={{flex:1,display:'flex',flexDirection:'column',overflow:'hidden'}}>
      <div style={{background:'#00313C',padding:'14px 16px 18px',flexShrink:0}}>
        <div style={{display:'flex',alignItems:'center',gap:12,marginBottom:10}}>
          <button onClick={onBack} style={{background:'none',border:'none',color:'#7EC8D8',fontSize:24,fontWeight:900,cursor:'pointer',padding:0}}>‹</button>
          <span style={{color:'#fff',fontWeight:800,fontSize:16,flex:1}}>Guia de Preparo</span>
          <span style={{color:'#7EC8D8',fontSize:12,fontWeight:700}}>{cur+1}/{steps.length}</span>
        </div>
        <div style={{height:4,background:'rgba(255,255,255,.2)',borderRadius:4,overflow:'hidden'}}><div style={{height:'100%',background:'#7EC8D8',width:`${pct}%`,transition:'width .3s'}}/></div>
        <div style={{display:'flex',justifyContent:'center',gap:5,marginTop:8,flexWrap:'wrap'}}>
          {steps.map((_,i)=><div key={i} style={{width:7,height:7,borderRadius:'50%',background:done.has(i)?'#7EC8D8':i===cur?'#fff':'rgba(255,255,255,.25)'}}/>)}
        </div>
      </div>
      <div className="sc" style={{flex:1,padding:12,paddingBottom:100}}>
        <div className="card" style={{textAlign:'center',padding:20}}>
          <div style={{fontSize:46,marginBottom:8}}>{s.icon}</div>
          <div style={{fontSize:17,fontWeight:900,marginBottom:10}}>{s.title}</div>
          {!s.fixed&&(
            <div style={{textAlign:'left',marginBottom:10}}>
              <span style={{fontSize:11,fontWeight:800,color:'#fff',background:s.color,padding:'3px 10px',borderRadius:20,display:'inline-block',marginBottom:8}}>{s.sub}</span>
              {s.dose&&<div style={{background:'#e0f4f7',borderRadius:8,padding:'7px 12px',fontSize:13,fontWeight:700,color:'#006E85',marginBottom:8}}>📏 Dose: {s.dose}</div>}
            </div>
          )}
          <div style={{background:'#f5f5f5',borderRadius:10,padding:'9px 13px',fontSize:13,color:'#555',textAlign:'left'}}>{s.detail}</div>
          {s.timer&&<Timer key={cur} seconds={s.timer}/>}
        </div>
        {cur<steps.length-1&&(
          <div className="card" style={{display:'flex',alignItems:'center',gap:10,padding:'10px 14px'}}>
            <span style={{fontSize:11,color:'#bbb',fontWeight:700}}>A SEGUIR →</span>
            <span style={{fontSize:16}}>{steps[cur+1].icon}</span>
            <span style={{fontSize:13,fontWeight:700,color:'#555',flex:1}}>{steps[cur+1].title.replace('Adicionar: ','')}</span>
          </div>
        )}
        <div className="card">
          <div style={{fontSize:11,fontWeight:700,color:'#999',textTransform:'uppercase',marginBottom:8}}>Checklist ({done.size}/{steps.length})</div>
          {steps.map((st,i)=>(
            <div key={i} style={{display:'flex',alignItems:'center',gap:8,padding:'5px 8px',borderRadius:8,background:i===cur?'#e0f4f7':'transparent',marginBottom:2}}>
              <span style={{fontSize:13}}>{done.has(i)?'✅':i===cur?'👉':'⬜'}</span>
              <span style={{fontSize:12,fontWeight:700,color:done.has(i)?'#bbb':'#333',textDecoration:done.has(i)?'line-through':'none'}}>{st.title.replace('Adicionar: ','')}</span>
            </div>
          ))}
        </div>
      </div>
      <div style={{padding:'10px 12px 16px',background:'#fff',borderTop:'1px solid #eee',display:'flex',flexDirection:'column',gap:8}}>
        <button className="btn" onClick={next} disabled={saving}>{saving?'Salvando...':cur===steps.length-1?'✅ Concluir → Jar Test':`Etapa ${cur+1} ✓ → Próxima`}</button>
        {cur>0&&<button className="btn-ghost" onClick={()=>setCur(c=>c-1)}>← Voltar etapa</button>}
      </div>
    </div>
  )
}

      <div className="sc" style={{flex:1,padding:12,paddingBottom:100}}>
        <div className="card" style={{borderLeft:'4px solid #006E85',background:'#e0f4f7'}}>
          <div style={{fontWeight:800,fontSize:13,color:'#006E85',marginBottom:6}}>Como realizar</div>
          <div style={{fontSize:12,color:'#444',lineHeight:1.9}}>1. Encha um pote de 500 mL com amostra da mistura<br/>2. Agite vigorosamente por 30 segundos<br/>3. Deixe em repouso por 3 minutos<br/>4. Observe precipitação, separação, espuma e consistência</div>
        </div>
        <div style={{fontWeight:800,fontSize:13,marginBottom:8}}>Resultado</div>
        {JAROPTS.map(opt=>(
          <div key={opt.r} className="card" onClick={()=>setSel(opt.r)} style={{cursor:'pointer',display:'flex',alignItems:'center',gap:12,border:`2px solid ${sel===opt.r?'#006E85':'transparent'}`,background:sel===opt.r?'#e0f4f7':'#fff',marginBottom:8,padding:'11px 14px'}}>
            <span style={{fontSize:22}}>{opt.icon}</span>
            <div style={{flex:1}}><div style={{fontWeight:800,fontSize:13}}>{opt.label}</div><div style={{fontSize:11,color:'#777',marginTop:1}}>{opt.desc}</div></div>
            {sel===opt.r&&<span style={{color:'#006E85',fontWeight:900,fontSize:18}}>✓</span>}
          </div>
        ))}
        <div className="card">
          <label className="lbl">Observações (opcional)</label>
          <textarea className="field" rows={3} placeholder="Anote detalhes sobre a calda..." value={notes} onChange={e=>setNotes(e.target.value)} style={{resize:'none'}}/>
        </div>
      </div>
      <div style={{padding:'10px 12px 16px',background:'#fff',borderTop:'1px solid #eee'}}>
        <button className="btn" onClick={save} disabled={saving}>{saving?'Salvando...':'💾 Salvar Jar Test'}</button>
      </div>
    </div>
  )
}

function LotDetailScreen({lot:initLot,op,onBack,onNav,onLotUpdate}){
  const[lot,setLot]=useState(initLot)
  const[telem,setTelem]=useState(null)
  const[jar,setJar]=useState(null)
  const[applying,setApplying]=useState(false)
  const[editando,setEditando]=useState(false)

  useEffect(()=>{
    dbSelect('telem',{lot_id:lot.id}).then(d=>{if(d.length)setTelem(d[0])})
    dbSelect('jars',{lot_id:lot.id}).then(d=>{if(d.length)setJar(d[0])})
  },[lot.id])

  const TL=[{s:'WATER_OK',icon:'💧',label:'Água'},{s:'PREPARING',icon:'⚗️',label:'Preparo'},{s:'JAR_TEST',icon:'🧪',label:'Jar Test'},{s:'READY',icon:'✅',label:'Pronta'},{s:'APPLIED',icon:'🚜',label:'Aplicada'}]
  const li=SO.indexOf(lot.status)
  const JarLabel={ESTAVEL:'Estável ✅',SEPARACAO:'Separação de fases ⚠️',SEDIMENTACAO:'Sedimentação ⚠️',ESPUMA:'Espuma excessiva ⚠️',GEL:'Virou gel ❌'}

  const podeEditar=['REQUESTED','WATER_OK'].includes(lot.status)

  const apply=async()=>{
    setApplying(true)
    await dbUpdate('lots',lot.id,{status:'APPLIED'})
    const u={...lot,status:'APPLIED'}
    setLot(u);onLotUpdate&&onLotUpdate(u)
    setApplying(false)
  }

  const incompats=lot.recipe_text?detectIncompat(parseRecipe(lot.recipe_text)):[]

  // ── Modal de edição de receita inline ──────────────────────────
  const EditModal=()=>{
    const parsed=useMemo(()=>parseRecipe(lot.recipe_text||''),[])
    const[prods,setProds]=useState(()=>
      parsed.map(p=>({name:p.name,nameKey:nrm(p.name),type:p.type,dose:p.dose||''}))
    )
    const[saving,setSaving]=useState(false)
    const[allProducts]=useState(()=>getAllProducts())
    const[search,setSearch]=useState('')
    const[picking,setPicking]=useState(null)
    const[doseVal,setDoseVal]=useState('')
    const[doseUnit,setDoseUnit]=useState('L/ha')

    const sorted=useMemo(()=>[...prods].sort((a,b)=>(ORD[a.type]||9)-(ORD[b.type]||9)),[prods])
    const incompatsEdit=useMemo(()=>detectIncompat(sorted),[sorted])

    const filtered=useMemo(()=>{
      if(!search.trim()) return []
      const q=nrm(search)
      return allProducts.filter(p=>nrm(p.name).includes(q)).slice(0,6)
    },[search])

    const selectProduct=(p)=>{
      setPicking(p);setSearch('');setDoseVal('');setDoseUnit('L/ha')
    }
    const confirmAdd=()=>{
      if(!picking) return
      const dose=doseVal.trim()?(doseVal.trim().replace(',','.')+' '+doseUnit):''
      setProds(prev=>[...prev,{name:picking.name,nameKey:picking.nameKey,type:picking.type,dose}])
      setPicking(null)
    }
    const removeProduct=(idx)=>setProds(prev=>prev.filter((_,i)=>i!==idx))
    const moveUpP=(idx)=>setProds(prev=>{if(idx===0)return prev;const a=[...prev];[a[idx-1],a[idx]]=[a[idx],a[idx-1]];return a})
    const moveDownP=(idx)=>setProds(prev=>{if(idx>=prev.length-1)return prev;const a=[...prev];[a[idx],a[idx+1]]=[a[idx+1],a[idx]];return a})

    const salvar=async()=>{
      setSaving(true)
      const newRecipe=prods.map(p=>p.dose?`${p.name} ${p.dose}`:p.name).join(' + ')
      await dbUpdate('lots',lot.id,{recipe_text:newRecipe})
      const updated={...lot,recipe_text:newRecipe}
      setLot(updated);onLotUpdate&&onLotUpdate(updated)
      setSaving(false);setEditando(false)
    }

    return(
      <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,.6)',zIndex:999,display:'flex',alignItems:'flex-end',justifyContent:'center'}}>
        <div style={{background:'#fff',borderRadius:'20px 20px 0 0',width:'100%',maxWidth:480,padding:'20px 16px 28px',maxHeight:'92vh',overflowY:'auto'}}>

          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:14}}>
            <div style={{fontWeight:900,fontSize:16,color:'#00313C'}}>✏️ Editar Receita</div>
            <button onClick={()=>setEditando(false)} style={{background:'none',border:'none',fontSize:22,color:'#bbb',cursor:'pointer'}}>✕</button>
          </div>

          {/* Alerta de incompatibilidade */}
          {incompatsEdit.length>0&&(
            <div style={{background:'#c62828',borderRadius:12,padding:'10px 12px',marginBottom:12}}>
              <div style={{fontWeight:800,fontSize:13,color:'#fff',marginBottom:4}}>⛔ Incompatibilidade detectada!</div>
              {incompatsEdit.map((inc,i)=><div key={i} style={{fontSize:12,color:'rgba(255,255,255,.9)'}}>{inc.icon} {inc.title}</div>)}
            </div>
          )}

          {/* Lista de produtos atual */}
          {sorted.length>0&&(
            <div style={{marginBottom:14}}>
              <div style={{fontSize:11,fontWeight:800,color:'#999',textTransform:'uppercase',marginBottom:8}}>Produtos na mistura — ordem de adição</div>
              {prods.map((p,i)=>(
                <div key={i} style={{display:'flex',alignItems:'center',gap:6,padding:'9px 10px',background:'#f8f8f8',borderRadius:10,marginBottom:6}}>
                  <div style={{display:'flex',flexDirection:'column',gap:2,flexShrink:0}}>
                    <button onMouseDown={()=>moveUpP(i)} disabled={i===0} style={{background:i===0?'transparent':'#e0f4f7',border:'none',borderRadius:5,width:22,height:20,cursor:i===0?'default':'pointer',fontSize:11,color:i===0?'#ccc':'#006E85',fontWeight:900,padding:0}}>↑</button>
                    <button onMouseDown={()=>moveDownP(i)} disabled={i===prods.length-1} style={{background:i===prods.length-1?'transparent':'#e0f4f7',border:'none',borderRadius:5,width:22,height:20,cursor:i===prods.length-1?'default':'pointer',fontSize:11,color:i===prods.length-1?'#ccc':'#006E85',fontWeight:900,padding:0}}>↓</button>
                  </div>
                  <div style={{width:22,height:22,borderRadius:'50%',background:'#00313C',color:'#fff',display:'flex',alignItems:'center',justifyContent:'center',fontWeight:900,fontSize:10,flexShrink:0}}>{i+1}</div>
                  <span style={{fontSize:16}}>{FI[p.type]||'🔬'}</span>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{fontWeight:700,fontSize:13}}>{p.name}</div>
                    <div style={{display:'flex',gap:6,marginTop:2}}>
                      <span style={{fontSize:10,fontWeight:800,color:'#fff',background:FC[p.type]||'#9E9E9E',padding:'1px 6px',borderRadius:20}}>{FL[p.type]||'?'}</span>
                      {p.dose&&<span style={{fontSize:11,color:'#777'}}>{p.dose}</span>}
                    </div>
                  </div>
                  <button onMouseDown={()=>removeProduct(i)} style={{background:'none',border:'none',color:'#e57373',fontSize:20,cursor:'pointer',padding:'2px 6px',flexShrink:0}}>✕</button>
                </div>
              ))}
            </div>
          )}

          {/* Adicionar produto */}
          <div style={{background:'#f0f8fa',borderRadius:12,padding:'12px',marginBottom:14}}>
            <div style={{fontWeight:800,fontSize:13,color:'#00313C',marginBottom:10}}>➕ Adicionar produto</div>
            {!picking?(
              <div style={{position:'relative'}}>
                <input className="field" placeholder="🔍 Buscar produto..." value={search}
                  onChange={e=>setSearch(e.target.value)} autoComplete="off" style={{marginBottom:0}}/>
                {search.trim()&&(
                  <div style={{position:'absolute',top:'100%',left:0,right:0,background:'#fff',border:'1.5px solid #006E85',borderRadius:12,zIndex:100,boxShadow:'0 8px 24px rgba(0,0,0,.15)',overflow:'hidden',marginTop:4}}>
                    {filtered.map((p,i)=>(
                      <div key={i} onClick={()=>selectProduct(p)} style={{display:'flex',alignItems:'center',gap:10,padding:'10px 12px',borderBottom:'1px solid #f5f5f5',cursor:'pointer'}}
                        onMouseEnter={e=>e.currentTarget.style.background='#f0f8fa'}
                        onMouseLeave={e=>e.currentTarget.style.background='#fff'}>
                        <span style={{fontSize:16}}>{FI[p.type]}</span>
                        <div style={{flex:1}}>
                          <div style={{fontWeight:700,fontSize:13}}>{p.name}</div>
                          <div style={{fontSize:11,color:'#999'}}>{FL[p.type]}</div>
                        </div>
                        <span style={{fontSize:11,fontWeight:800,color:'#fff',background:FC[p.type],padding:'2px 7px',borderRadius:20}}>{p.type}</span>
                      </div>
                    ))}
                    {filtered.length===0&&<div style={{padding:'10px 12px',fontSize:13,color:'#999'}}>Nenhum produto encontrado</div>}
                  </div>
                )}
              </div>
            ):(
              <div style={{background:'#fff',borderRadius:10,padding:'10px 12px',border:'2px solid #006E85'}}>
                <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:10}}>
                  <span style={{fontSize:18}}>{FI[picking.type]}</span>
                  <div style={{flex:1}}>
                    <div style={{fontWeight:800,fontSize:14}}>{picking.name}</div>
                    <span style={{fontSize:10,fontWeight:800,color:'#fff',background:FC[picking.type],padding:'1px 6px',borderRadius:20}}>{FL[picking.type]}</span>
                  </div>
                  <button onClick={()=>setPicking(null)} style={{background:'none',border:'none',color:'#bbb',fontSize:18,cursor:'pointer'}}>✕</button>
                </div>
                <div style={{display:'flex',gap:8}}>
                  <input className="field" type="number" placeholder="Dose (ex: 0,4)" value={doseVal}
                    onChange={e=>setDoseVal(e.target.value)} style={{flex:1,marginBottom:0}}
                    onKeyDown={e=>e.key==='Enter'&&confirmAdd()}/>
                  <select className="field" value={doseUnit} onChange={e=>setDoseUnit(e.target.value)}
                    style={{flex:1.2,marginBottom:0}}>
                    {DOSE_UNITS.map(u=><option key={u} value={u}>{u}</option>)}
                  </select>
                </div>
                <button className="btn" style={{marginTop:10}} onClick={confirmAdd}>✅ Adicionar</button>
              </div>
            )}
          </div>

          <button className="btn" onClick={salvar} disabled={saving||prods.length===0}>
            {saving?'Salvando...':'💾 Salvar alterações'}
          </button>
        </div>
      </div>
    )
  }

  return(
    <div style={{flex:1,display:'flex',flexDirection:'column',overflow:'hidden'}}>
      {editando&&<EditModal/>}
      <Hdr title="Detalhe da Mistura" onBack={onBack}/>
      <div className="sc" style={{flex:1,padding:12,paddingBottom:24}}>
        {incompats.length>0&&(
          <div style={{background:'#c62828',borderRadius:14,padding:'10px 14px',marginBottom:10}}>
            <div style={{fontWeight:800,fontSize:13,color:'#fff',marginBottom:4}}>⛔ Incompatibilidade na receita</div>
            {incompats.map((inc,i)=><div key={i} style={{fontSize:12,color:'rgba(255,255,255,.9)',marginBottom:2}}>{inc.icon} {inc.title}</div>)}
          </div>
        )}
        <div className="card" style={{borderTop:'4px solid #006E85'}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:10}}>
            <div><div style={{fontSize:17,fontWeight:900}}>{lot.farm}</div><div style={{fontSize:12,color:'#777'}}>{lot.field}</div></div>
            <div style={{display:'flex',gap:8,alignItems:'center'}}>
              {podeEditar&&(
                <button onClick={()=>setEditando(true)} style={{background:'#e0f4f7',border:'none',borderRadius:20,padding:'4px 12px',fontSize:12,fontWeight:800,color:'#006E85',cursor:'pointer'}}>
                  ✏️ Editar receita
                </button>
              )}
              <span className={`badge ${SC2[lot.status]}`}>{SL[lot.status]}</span>
            </div>
          </div>
          <div style={{display:'flex',borderTop:'1px solid #f0f0f0',paddingTop:8,marginBottom:10}}>
            {[['Volume',`${lot.volume_liters}L`],['Área',lot.area_ha?`${lot.area_ha}ha`:'—'],['pH',lot.last_ph?lot.last_ph.toFixed(1):'—']].map(([l,v])=>(
              <div key={l} style={{flex:1,textAlign:'center'}}><div style={{fontWeight:800,fontSize:14}}>{v}</div><div style={{fontSize:10,color:'#9e9e9e'}}>{l}</div></div>
            ))}
          </div>
          {lot.recipe_text&&<div style={{background:'#f5f5f5',borderRadius:8,padding:'7px 11px',marginBottom:10}}><div style={{fontSize:9,fontWeight:700,color:'#9e9e9e',textTransform:'uppercase',marginBottom:2}}>Receita</div><div style={{fontSize:11,color:'#555'}}>{lot.recipe_text}</div></div>}
          <div style={{display:'flex',alignItems:'center'}}>
            {TL.map((step,i)=>{
              const si=SO.indexOf(step.s),isDone=li>si,isActive=li===si
              return(<React.Fragment key={step.s}>
                <div style={{display:'flex',flexDirection:'column',alignItems:'center',flexShrink:0}}>
                  <div style={{width:30,height:30,borderRadius:'50%',display:'flex',alignItems:'center',justifyContent:'center',fontSize:11,fontWeight:800,background:isDone?'#006E85':isActive?'#e65100':'#e0e0e0',color:(isDone||isActive)?'#fff':'#9e9e9e'}}>{isDone?'✓':step.icon}</div>
                  <div style={{fontSize:8,fontWeight:800,color:isDone?'#006E85':isActive?'#e65100':'#bbb',marginTop:2,textAlign:'center',lineHeight:1.1}}>{step.label}</div>
                </div>
                {i<TL.length-1&&<div style={{flex:1,height:2,background:isDone?'#006E85':'#e0e0e0',margin:'0 3px',marginBottom:14}}/>}
              </React.Fragment>)
            })}
          </div>
        </div>
        {telem&&(
          <div className="card">
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:8}}>
              <span style={{fontWeight:800,fontSize:13}}>💧 Qualidade da Água</span>
              <span style={{fontSize:12,fontWeight:700,color:EC[telem.evaluation]||'#333'}}>{telem.evaluation}</span>
            </div>
            <div style={{display:'flex',gap:16}}>
              {[['pH',telem.ph],['Temp.',`${telem.temp_c}°C`],...(telem.conductivity?[['Cond.',telem.conductivity]]:[])] .map(([l,v])=>(
                <div key={l} style={{textAlign:'center'}}><div style={{fontWeight:800,fontSize:14}}>{v}</div><div style={{fontSize:10,color:'#9e9e9e'}}>{l}</div></div>
              ))}
            </div>
          </div>
        )}
        {jar&&(
          <div className="card">
            <div style={{fontWeight:800,fontSize:13,marginBottom:5}}>🧪 Jar Test</div>
            <div style={{fontSize:15,fontWeight:800}}>{JarLabel[jar.result]||jar.result}</div>
            {jar.notes&&<div style={{fontSize:12,color:'#777',marginTop:3,fontStyle:'italic'}}>{jar.notes}</div>}
          </div>
        )}
        <div style={{display:'flex',flexDirection:'column',gap:8}}>
          {lot.status==='REQUESTED'&&<button className="btn" onClick={()=>onNav('water',lot)}>→ Analisar Água</button>}
          {(lot.status==='WATER_OK'||lot.status==='PREPARING')&&<button className="btn" onClick={()=>onNav('prep',lot)}>→ Guia de Preparo</button>}
          {lot.status==='JAR_TEST'&&<button className="btn" onClick={()=>onNav('jartest',lot)}>→ Realizar Jar Test</button>}
          {lot.status==='READY'&&<button className="btn" style={{background:'#2e7d32'}} onClick={apply} disabled={applying}>{applying?'Registrando...':'🚜 Registrar Aplicação em Campo'}</button>}
          {lot.status==='APPLIED'&&<div style={{background:'#e8f5e9',border:'1px solid #c8e6c9',borderRadius:12,padding:'11px 16px',textAlign:'center',fontWeight:700,color:'#2e7d32'}}>✅ Calda aplicada em campo</div>}
          <button className="btn-ghost" onClick={()=>onNav('laudo',lot,telem,jar)}>📄 Gerar Laudo</button>
        </div>
      </div>
    </div>
  )
}

function LaudoScreen({lot,telem,jar,op,onBack}){
  const now=new Date(),dateStr=now.toLocaleDateString('pt-BR'),timeStr=now.toLocaleTimeString('pt-BR')
  const phColor=!telem?'#333':EC[telem.evaluation]||'#333'
  const phBg=!telem?'#f5f5f5':EB[telem.evaluation]||'#f5f5f5'
  const JarLabel={ESTAVEL:'Estável',SEPARACAO:'Separação de fases',SEDIMENTACAO:'Sedimentação',ESPUMA:'Espuma excessiva',GEL:'Virou gel'}
  const JarColor={ESTAVEL:'#2e7d32',SEPARACAO:'#e65100',SEDIMENTACAO:'#e65100',ESPUMA:'#e65100',GEL:'#c62828'}
  const JarBg={ESTAVEL:'#e8f5e9',SEPARACAO:'#fff3e0',SEDIMENTACAO:'#fff3e0',ESPUMA:'#fff3e0',GEL:'#ffebee'}

  // Parse produtos — fallback robusto: se parseRecipe der poucos resultados usa split direto
  const produtosParsed = lot.recipe_text ? parseRecipe(lot.recipe_text) : []
  const produtosRaw = lot.recipe_text
    ? lot.recipe_text.split(/[+]/).map(s=>s.trim()).filter(Boolean)
    : []
  // Usa parseRecipe se bateu todos os itens, senão monta manualmente
  const produtos = produtosParsed.length >= produtosRaw.length
    ? produtosParsed
    : produtosRaw.map(raw=>{
        const dm = raw.match(/([\d,\.]+\s*(?:L|mL|ml|g|kg|%)(?:\s*\/\s*(?:ha|vc|100L|hL|L))?)/i)
        const dose = dm ? dm[0].trim() : ''
        const name = raw.replace(dose,'').trim().replace(/\s+/g,' ') || raw.trim()
        return {name, dose, type: detectType(name)||'?', raw}
      })

  const timeline=[
    {icon:'📋',label:'Mistura criada',ts:lot.created_at,color:'#006E85'},
    telem&&{icon:'💧',label:'Água analisada',sub:`pH ${telem.ph} · ${telem.temp_c}°C · ${telem.evaluation}`,ts:telem.created_at,color:phColor},
    {icon:'⚗️',label:'Preparo concluído',ts:jar?.created_at||(telem?.created_at||lot.created_at)+120000,color:'#6D4C41'},
    jar&&{icon:'🧪',label:'Jar Test realizado',sub:JarLabel[jar.result]||jar.result,ts:jar.created_at,color:JarColor[jar.result]||'#006E85'},
    lot.status==='APPLIED'&&{icon:'🚜',label:'Aplicado em campo',ts:lot.applied_at,color:'#2e7d32'},
  ].filter(Boolean)

  const fmtTs=ts=>{
    if(!ts) return ''
    const d=new Date(ts)
    return d.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'})+' · '+d.toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit'})
  }

  const S=({title,children,accent='#006E85'})=>(
    <div style={{marginBottom:16}}>
      <div style={{fontSize:11,fontWeight:800,color:accent,borderBottom:`2px solid ${accent}33`,paddingBottom:5,marginBottom:10,textTransform:'uppercase',letterSpacing:.5}}>{title}</div>
      {children}
    </div>
  )
  const F=({label,value})=>(
    <div style={{marginBottom:7}}>
      <div style={{fontSize:9,fontWeight:700,color:'#9e9e9e',textTransform:'uppercase',marginBottom:1}}>{label}</div>
      <div style={{fontSize:13,fontWeight:700}}>{value||'—'}</div>
    </div>
  )

  return(
    <div style={{flex:1,display:'flex',flexDirection:'column',overflow:'hidden'}}>
      <div className="np"><Hdr title="📄 Laudo de Qualidade" onBack={onBack}/></div>
      <div className="sc" style={{flex:1,padding:12,paddingBottom:100}}>
        <div id="laudo" style={{background:'#fff',borderRadius:16,overflow:'hidden'}}>

          <div style={{background:'#00313C',padding:'18px 22px',textAlign:'center'}}>
            <div style={{color:'#fff',fontSize:20,fontWeight:900,letterSpacing:-1}}>FertigeoTech</div>
            <div style={{color:'#7EC8D8',fontSize:9,fontWeight:700,letterSpacing:3,marginTop:3,textTransform:'uppercase'}}>Laudo de Qualidade de Calda</div>
          </div>

          <div style={{padding:'18px 20px'}}>
            <div style={{display:'flex',justifyContent:'space-between',borderBottom:'1px solid #eee',paddingBottom:8,marginBottom:14,fontSize:10,color:'#9e9e9e'}}>
              <span>Gerado em {dateStr} às {timeStr}</span>
              <span style={{fontWeight:700,color:'#00313C'}}>#{lot.id.slice(-6).toUpperCase()}</span>
            </div>

            {/* Identificação */}
            <S title="📍 Identificação">
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:6}}>
                <F label="Fazenda" value={lot.farm}/>
                <F label="Talhão" value={lot.field}/>
                <F label="Volume" value={`${lot.volume_liters} L`}/>
                {lot.area_ha&&<F label="Área" value={`${lot.area_ha} ha`}/>}
              </div>
            </S>

            {/* Produtos da mistura — sempre em cards */}
            {produtos.length>0&&(
              <S title="🧴 Produtos da Mistura" accent="#006E85">
                <div style={{display:'flex',flexDirection:'column',gap:7}}>
                  {produtos.map((p,i)=>(
                    <div key={i} style={{display:'flex',alignItems:'center',gap:10,background:'#f0f8fa',borderRadius:12,padding:'10px 13px',border:'1.5px solid #c8e8f0'}}>
                      <div style={{width:28,height:28,borderRadius:'50%',background:'#00313C',color:'#fff',display:'flex',alignItems:'center',justifyContent:'center',fontWeight:900,fontSize:12,flexShrink:0}}>{i+1}</div>
                      <span style={{fontSize:20,flexShrink:0}}>{FI[p.type]||'🔬'}</span>
                      <div style={{flex:1,minWidth:0}}>
                        <div style={{fontWeight:800,fontSize:13,color:'#00313C',whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{p.name}</div>
                        <div style={{fontSize:10,color:'#7EC8D8',fontWeight:700,textTransform:'uppercase',letterSpacing:.3}}>{FL[p.type]||'Produto'}</div>
                      </div>
                      {p.dose&&(
                        <div style={{background:'#00313C',borderRadius:8,padding:'4px 11px',flexShrink:0}}>
                          <div style={{fontSize:12,fontWeight:900,color:'#fff',whiteSpace:'nowrap'}}>{p.dose}</div>
                        </div>
                      )}
                    </div>
                  ))}
                </div>
              </S>
            )}

            {/* Alertas de incompatibilidade */}
            {(()=>{
              const inc=detectIncompat(produtos)
              if(!inc.length) return null
              return(
                <S title="⚠️ Alertas de Incompatibilidade" accent="#c62828">
                  <div style={{display:'flex',flexDirection:'column',gap:6}}>
                    {inc.map((x,i)=>(
                      <div key={i} style={{borderRadius:10,padding:'10px 13px',background:x.sev==='danger'?'#ffebee':'#fff8e1',border:`1.5px solid ${x.sev==='danger'?'#ef9a9a':'#ffe082'}`}}>
                        <div style={{fontWeight:800,fontSize:13,color:x.sev==='danger'?'#c62828':'#e65100',marginBottom:3}}>{x.icon} {x.title}</div>
                        <div style={{fontSize:11,color:'#555',marginBottom:3}}>{x.msg}</div>
                        <div style={{fontSize:11,color:'#2e7d32',fontWeight:700}}>✅ {x.rec}</div>
                      </div>
                    ))}
                  </div>
                </S>
              )
            })()}

            {/* Qualidade da Água */}
            {telem&&(
              <S title="💧 Qualidade da Água" accent={phColor}>
                <div style={{display:'flex',gap:8,marginBottom:8}}>
                  {[['pH',telem.ph],['Temperatura',`${telem.temp_c}°C`],...(telem.conductivity?[['Condutividade',`${telem.conductivity} µS/cm`]]:[])].map(([l,v])=>(
                    <div key={l} style={{flex:1,background:'#f5f5f5',borderRadius:10,padding:'9px 10px',textAlign:'center'}}>
                      <div style={{fontSize:9,fontWeight:700,color:'#9e9e9e',textTransform:'uppercase'}}>{l}</div>
                      <div style={{fontSize:18,fontWeight:900,color:'#00313C',marginTop:2}}>{v}</div>
                    </div>
                  ))}
                </div>
                <div style={{background:phBg,borderRadius:8,padding:'7px 12px',display:'flex',alignItems:'center',gap:6}}>
                  <span style={{fontSize:13,fontWeight:800,color:phColor}}>Avaliação: {telem.evaluation}</span>
                </div>
              </S>
            )}

            {/* Jar Test */}
            {jar&&(
              <S title="🧪 Jar Test" accent={JarColor[jar.result]||'#006E85'}>
                <div style={{background:JarBg[jar.result]||'#f5f5f5',borderRadius:10,padding:'11px 14px',border:`1.5px solid ${JarColor[jar.result]||'#ddd'}44`}}>
                  <div style={{fontSize:15,fontWeight:900,color:JarColor[jar.result]||'#333',marginBottom:jar.notes?4:0}}>
                    {jar.result==='ESTAVEL'?'✅':'⚠️'} {JarLabel[jar.result]||jar.result}
                  </div>
                  {jar.notes&&<div style={{fontSize:12,color:'#666',fontStyle:'italic'}}>{jar.notes}</div>}
                </div>
              </S>
            )}

            {/* Linha do tempo */}
            <S title="🕐 Linha do Tempo" accent="#6D4C41">
              <div style={{position:'relative',paddingLeft:24}}>
                <div style={{position:'absolute',left:7,top:8,bottom:8,width:2,background:'#e0e0e0',borderRadius:2}}/>
                {timeline.map((ev,i)=>(
                  <div key={i} style={{position:'relative',marginBottom:i<timeline.length-1?14:0,display:'flex',alignItems:'flex-start',gap:10}}>
                    <div style={{position:'absolute',left:-24,top:0,width:16,height:16,borderRadius:'50%',background:ev.color,display:'flex',alignItems:'center',justifyContent:'center',fontSize:9,color:'#fff',flexShrink:0,zIndex:1}}>●</div>
                    <div style={{flex:1}}>
                      <div style={{display:'flex',justifyContent:'space-between',alignItems:'baseline',gap:8}}>
                        <span style={{fontSize:12,fontWeight:800,color:'#00313C'}}>{ev.icon} {ev.label}</span>
                        <span style={{fontSize:10,color:'#9e9e9e',flexShrink:0}}>{fmtTs(ev.ts)}</span>
                      </div>
                      {ev.sub&&<div style={{fontSize:11,color:'#777',marginTop:1}}>{ev.sub}</div>}
                    </div>
                  </div>
                ))}
              </div>
            </S>

            {/* Responsável */}
            <S title="👤 Responsável Técnico" accent="#00313C">
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:6}}>
                <F label="Nome" value={op?.name}/>
                <F label="Função" value={op?.role}/>
                {op?.company&&<F label="Empresa" value={op.company}/>}
                {op?.crea&&<F label="CREA/CFTA" value={op.crea}/>}
              </div>
            </S>

            <div style={{marginTop:18,paddingTop:14,borderTop:'1px solid #eee'}}>
              <div style={{fontSize:10,color:'#9e9e9e',marginBottom:6}}>Assinatura do responsável técnico</div>
              <div style={{borderBottom:'2px solid #333',width:180,height:36,marginBottom:5}}/>
              <div style={{fontSize:11,color:'#555'}}>{op?.name} · {op?.role}</div>
              {op?.crea&&<div style={{fontSize:10,color:'#9e9e9e'}}>CREA/CFTA: {op.crea}</div>}
            </div>

            <div style={{marginTop:16,textAlign:'center',fontSize:9,color:'#bbb',borderTop:'1px solid #f0f0f0',paddingTop:10}}>
              Gerado em {dateStr}, {timeStr} — FertigeoTech · Fertigeo Inteligência Agrícola
            </div>
          </div>
        </div>
      </div>
      <div className="np" style={{padding:'10px 12px 16px',background:'#fff',borderTop:'1px solid #eee',display:'flex',flexDirection:'column',gap:8}}>
        <button className="btn" onClick={()=>window.print()}>🖨️ Imprimir / Salvar PDF</button>
        <button className="btn-ghost" onClick={onBack}>Voltar</button>
      </div>
    </div>
  )
}


function ManagerScreen({lots,onNav}){
  const today=new Date().toDateString()
  const kpis=[
    {icon:'📋',label:'Hoje',val:lots.filter(l=>new Date(l.created_at).toDateString()===today).length,c:'#006E85'},
    {icon:'✅',label:'Prontas',val:lots.filter(l=>l.status==='READY').length,c:'#4caf50'},
    {icon:'⚗️',label:'Em andamento',val:lots.filter(l=>!['READY','APPLIED','REQUESTED'].includes(l.status)).length,c:'#e65100'},
    {icon:'⚠️',label:'Riscos',val:lots.filter(l=>l.last_ph&&(l.last_ph<5||l.last_ph>7)).length,c:'#c62828'},
  ]
  const active=lots.filter(l=>l.status!=='APPLIED')
  const risks=lots.filter(l=>l.last_ph&&(l.last_ph<5||l.last_ph>7))
  const TL=[{s:'WATER_OK',icon:'💧'},{s:'PREPARING',icon:'⚗️'},{s:'JAR_TEST',icon:'🧪'},{s:'READY',icon:'✅'},{s:'APPLIED',icon:'🚜'}]
  return(
    <div style={{flex:1,display:'flex',flexDirection:'column',overflow:'hidden'}}>
      <div style={{background:'#00313C',padding:'14px 16px',flexShrink:0}}>
        <div style={{color:'#fff',fontWeight:800,fontSize:16}}>📊 Painel do Gestor</div>
        <div style={{color:'#7EC8D8',fontSize:11,marginTop:2}}>Visão geral de operações</div>
      </div>
      <div className="sc" style={{flex:1,padding:12,paddingBottom:24}}>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginBottom:12}}>
          {kpis.map(k=>(
            <div key={k.label} className="card" style={{textAlign:'center',marginBottom:0}}>
              <div style={{fontSize:22,marginBottom:3}}>{k.icon}</div>
              <div style={{fontSize:24,fontWeight:900,color:k.c}}>{k.val}</div>
              <div style={{fontSize:11,color:'#777',fontWeight:600}}>{k.label}</div>
            </div>
          ))}
        </div>
        {risks.length>0&&(
          <div className="card" style={{borderLeft:'4px solid #f44336',background:'#ffebee',marginBottom:10}}>
            <div style={{fontWeight:800,fontSize:13,color:'#c62828',marginBottom:5}}>⚠️ pH fora do ideal</div>
            {risks.map(l=><div key={l.id} style={{fontSize:12,color:'#b71c1c',marginBottom:1}}>• {l.farm} / {l.field} — pH {l.last_ph?.toFixed(1)}</div>)}
          </div>
        )}
        <div style={{fontWeight:800,fontSize:13,marginBottom:8}}>Operações em andamento</div>
        {active.length===0&&<div className="card" style={{textAlign:'center',padding:'20px',color:'#9e9e9e',fontSize:13}}>Nenhuma operação ativa</div>}
        {active.map(lot=>{
          const li=SO.indexOf(lot.status)
          return(
            <div key={lot.id} className="card" onClick={()=>onNav('detail',lot)} style={{cursor:'pointer',marginBottom:8}}>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:8}}>
                <div><div style={{fontWeight:800,fontSize:13}}>{lot.farm}</div><div style={{fontSize:11,color:'#777'}}>{lot.field} · {lot.volume_liters}L</div></div>
                <span className={`badge ${SC2[lot.status]}`}>{SL[lot.status]}</span>
              </div>
              <div style={{display:'flex',alignItems:'center',gap:3}}>
                {TL.map((step,i)=>{
                  const si=SO.indexOf(step.s),isDone=li>si,isActive=li===si
                  return(<React.Fragment key={step.s}>
                    <div style={{width:26,height:26,borderRadius:'50%',display:'flex',alignItems:'center',justifyContent:'center',fontSize:10,fontWeight:800,background:isDone?'#006E85':isActive?'#e65100':'#e0e0e0',color:(isDone||isActive)?'#fff':'#9e9e9e',flexShrink:0}}>{isDone?'✓':step.icon}</div>
                    {i<TL.length-1&&<div style={{flex:1,height:2,background:isDone?'#006E85':'#e0e0e0'}}/>}
                  </React.Fragment>)
                })}
              </div>
            </div>
          )
        })}
        {lots.filter(l=>l.last_ph).length>0&&(
          <div className="card" style={{marginTop:4}}>
            <div style={{fontWeight:800,fontSize:13,marginBottom:8}}>pH por talhão</div>
            {lots.filter(l=>l.last_ph).slice(0,8).map(l=>{
              const ph=l.last_ph,cls=ph>=5.5&&ph<=6.5?'bg-green':ph>=4.5&&ph<=7?'bg-orange':'bg-red'
              return(
                <div key={l.id} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'7px 0',borderBottom:'1px solid #f5f5f5'}}>
                  <div><span style={{fontWeight:700,fontSize:13}}>{l.farm}</span><span style={{color:'#9e9e9e',fontSize:11}}> — {l.field}</span></div>
                  <span className={`badge ${cls}`}>pH {ph.toFixed(1)}</span>
                </div>
              )
            })}
          </div>
        )}
      </div>
    </div>
  )
}

// ═══════════════════════════════════════════════════════════════
// MAIN APP
// ═══════════════════════════════════════════════════════════════
const MGROLES=['Engenheiro Agrônomo','Técnico Agrícola']

function App(){
  const[op,setOp]=useState(()=>{try{return JSON.parse(localStorage.getItem('ft_op')||'null')}catch{return null}})
  const[screen,setScreen]=useState('home')
  const[ctx,setCtx]=useState({})
  const[lots,setLots]=useState([])
  const[tab,setTab]=useState('home')

  useEffect(()=>{ if(op) loadLots() },[op])
  const loadLots=()=>selectAll('lots').then(d=>setLots(d))

  const login=o=>{localStorage.setItem('ft_op',JSON.stringify(o));setOp(o)}
  const logout=()=>{localStorage.removeItem('ft_op');setOp(null);setLots([])}
  const nav=(sc,lot=null,telem=null,jar=null)=>{setCtx({lot,telem,jar});setScreen(sc)}
  const goTab=t=>{setTab(t);setScreen('home')}
  const updateLot=u=>setLots(prev=>prev.map(l=>l.id===u.id?u:l))

  if(!op) return <LoginScreen onLogin={login}/>

  if(screen==='new') return <NewLotScreen onBack={()=>{setScreen('home')}} onSaved={lot=>{setLots(p=>[lot,...p]);nav('water',lot)}}/>
  if(screen==='water') return <WaterScreen lot={ctx.lot} onBack={()=>nav('detail',ctx.lot)} onDone={(u,t)=>{updateLot(u);nav('prep',u)}}/>
  if(screen==='prep') return <PrepScreen lot={ctx.lot} onBack={()=>nav('detail',ctx.lot)} onDone={u=>{updateLot(u);nav('jartest',u)}}/>
  if(screen==='jartest') return <JarTestScreen lot={ctx.lot} onBack={()=>nav('detail',ctx.lot)} onDone={(u,j)=>{updateLot(u);nav('detail',u)}}/>
  if(screen==='detail') return <LotDetailScreen lot={ctx.lot} op={op} onBack={()=>{loadLots();goTab(tab)}} onNav={nav} onLotUpdate={updateLot}/>
  if(screen==='laudo') return <LaudoScreen lot={ctx.lot} telem={ctx.telem} jar={ctx.jar} op={op} onBack={()=>nav('detail',ctx.lot,ctx.telem,ctx.jar)}/>

  const isManager=MGROLES.includes(op?.role)
  const TABS=[{id:'home',icon:'🏠',label:'Início'},{id:'lots',icon:'⚗️',label:'Misturas'},isManager&&{id:'manager',icon:'📊',label:'Gestor'}].filter(Boolean)

  return(
    <div style={{flex:1,display:'flex',flexDirection:'column',overflow:'hidden'}}>
      <div style={{flex:1,overflow:'hidden',display:'flex',flexDirection:'column'}}>
        {tab==='home'&&<HomeScreen op={op} onLogout={logout} onNav={nav} lots={lots} onNew={()=>setScreen('new')}/>}
        {tab==='lots'&&<LotsScreen lots={lots} onNav={nav} onNew={()=>setScreen('new')}/>}
        {tab==='manager'&&isManager&&<ManagerScreen lots={lots} onNav={nav}/>}
      </div>
      <div className="tab-bar np">
        {TABS.map(t=>(
          <button key={t.id} className={`tab-btn${tab===t.id?' active':''}`} onClick={()=>goTab(t.id)}>
            <span style={{fontSize:20}}>{t.icon}</span>
            <span>{t.label}</span>
          </button>
        ))}
      </div>
    </div>
  )
}


class ErrBound extends React.Component{
  constructor(p){super(p);this.state={err:null,info:null}}
  static getDerivedStateFromError(e){return{err:e}}
  componentDidCatch(e,i){console.error('CRASH:',e.message,i?.componentStack?.slice(0,200))}
  render(){
    if(this.state.err) return(
      <div style={{padding:20,background:'#fff',margin:20,borderRadius:12,border:'2px solid #c62828',fontFamily:'monospace'}}>
        <div style={{fontWeight:900,color:'#c62828',marginBottom:8,fontSize:14}}>⚠️ Erro na aplicação</div>
        <pre style={{fontSize:11,whiteSpace:'pre-wrap',color:'#333'}}>{this.state.err.message}</pre>
        <button onClick={()=>this.setState({err:null})} style={{marginTop:10,padding:'6px 16px',background:'#006E85',color:'#fff',border:'none',borderRadius:8,cursor:'pointer'}}>Tentar novamente</button>
      </div>
    )
    return this.props.children
  }
}

ReactDOM.createRoot(document.getElementById('root')).render(<ErrBound><App/></ErrBound>)
</script>
</body>
